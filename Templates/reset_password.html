<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourTreasurer | Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="profile-page">
  <div class="brand-logo-top">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="YourTreasurer Logo">
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash-msg flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="gateway-wrapper">
    <div class="gateway-card" id="gateway-card">
      <div class="gateway-header">
        <div class="lock-icon" style="font-size: 2.6rem;">🔁</div>
        <h1 class="gateway-title">Reset Password</h1>
        <p class="gateway-subtitle">We’ll email a 6-digit verification code</p>
      </div>

      <form class="gateway-form active-form" action="{{ url_for('auth_reset_start') }}" method="POST">
        <div class="input-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <button type="submit" class="gateway-btn">
          <span class="btn-text">Send Code</span>
          <span class="btn-icon">📨</span>
        </button>
      </form>

      <div class="auth-links-row" style="margin-top:14px;">
        <a class="auth-link" href="{{ url_for('my_profile') }}">Back to gateway</a>
      </div>
    </div>
  </div>

  <footer class="common-footer">
    YourTreasurer &copy; 2026 | Helping Hand
  </footer>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.querySelectorAll('.flash-msg').forEach(msg => {
          msg.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          msg.style.opacity = '0';
          msg.style.transform = 'translateY(-10px)';
          setTimeout(() => msg.remove(), 400);
        });
      }, 5000);
    });
  </script>
</body>
</html>
